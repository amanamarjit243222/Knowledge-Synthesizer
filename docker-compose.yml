version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENV=production

  frontend:
    image: python:3.10-slim
    volumes:
      - ./frontend:/app
    working_dir: /app
    ports:
      - "8080:8000"
    command: python -m http.server 8000
